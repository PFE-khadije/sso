<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NovaGard — Connexion</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(180deg,#0D1229 0%,#0A0E21 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}
  .card{width:100%;max-width:400px;background:#141829;border:1px solid #252B44;border-radius:24px;padding:40px 36px}
  .logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#4F6AF5,#7B5EA7);display:flex;align-items:center;justify-content:center;margin-bottom:28px}
  .logo svg{width:28px;height:28px;fill:white}
  h1{font-size:26px;font-weight:800;margin-bottom:6px}
  .sub{color:#8B92B2;font-size:14px;margin-bottom:32px}
  .field{margin-bottom:16px}
  label{display:block;font-size:12px;color:#8B92B2;margin-bottom:6px}
  input{width:100%;padding:14px 16px;border-radius:14px;background:#1C2235;border:1px solid #252B44;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
  input:focus{border-color:#4F6AF5}
  .error{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.3);border-radius:12px;padding:12px 14px;color:#EF5350;font-size:13px;margin-bottom:20px}
  .btn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,#4F6AF5,#7B5EA7);color:white;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
  .btn:hover{opacity:.9}
  .hint{margin-top:24px;text-align:center;font-size:13px;color:#8B92B2}
  .hint a{color:#4F6AF5;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
  </div>
  <h1>Connexion SSO</h1>
  <p class="sub">Connectez-vous à votre compte NovaGard pour continuer</p>
  {% if request.GET.registered %}<div class="error" style="background:rgba(0,212,170,.12);border-color:rgba(0,212,170,.3);color:#00c49a">Compte créé avec succès ! Connectez-vous maintenant.</div>{% endif %}
  {% if form.errors %}<div class="error">Email ou mot de passe incorrect.</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field"><label>Email</label><input type="email" name="username" autofocus placeholder="vous@exemple.com"></div>
    <div class="field"><label>Mot de passe</label><input type="password" name="password" placeholder="••••••••"></div>
    <button type="submit" class="btn">Se connecter</button>
  </form>
  <p class="hint">Pas encore de compte ? <a href="/demo/register/?next={{ next|urlencode }}">Créer un compte</a></p>
</div>
</body>
</html>
