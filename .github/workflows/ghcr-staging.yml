name: Build and Push Staging Image

on:
  push:
    branches:
      - ci/docker-staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load backend source from main (runtime only)
        # We keep deployment config on ci/docker-staging, but backend code lives on main.
        # This copies backend into the CI workspace only; it does not modify branches.
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- backend
          test -f backend/requirements.txt
          test -f backend/manage.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging
            type=sha,format=short,prefix=staging-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
