<!DOCTYPE html>
<html>
<head>
    <title>Connexion à la plateforme SSO</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Connexion</h2>
    {% if form.errors %}
        <p class="error">Nom d'utilisateur ou mot de passe incorrect.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
        <input type="hidden" name="next" value="{{ next }}" />
    </form>
</body>
</html>
